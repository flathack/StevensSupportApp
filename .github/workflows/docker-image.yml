name: Build and Publish Docker Image

on:
  push:
    branches:
      - development
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: flathack/stevens-support-app

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build smoke-test image
        run: docker build --tag stevens-support-app:smoke .

      - name: Run smoke test
        run: |
          docker run --rm -d --name stevens-support-app-smoke -p 5000:5000 stevens-support-app:smoke
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5000/health > /tmp/health.json; then
              cat /tmp/health.json
              docker stop stevens-support-app-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs stevens-support-app-smoke
          docker stop stevens-support-app-smoke
          exit 1

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
